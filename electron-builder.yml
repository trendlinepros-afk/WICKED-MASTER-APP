appId: com.wickedrc.wicked
productName: WICKED
directories:
  buildResources: build
  output: release
files:
  - out/**
  - '!**/.vscode/*'
  - '!src/*'
  - '!_sources/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
asarUnpack:
  - resources/**
  # spawned as real processes by the automatic-editing module — cannot live inside the asar
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**
win:
  executableName: WICKED
  icon: build/icon.png
  target:
    - nsis
nsis:
  artifactName: WICKED-Setup-${version}.${ext}
  shortcutName: WICKED
  uninstallDisplayName: WICKED
  oneClick: true
  perMachine: false
  # never delete user data (API keys, settings, module file paths live in userData)
  # on uninstall; updates never touch userData either
  deleteAppDataOnUninstall: false
npmRebuild: true
# ──────────────────────────────────────────────────────────────
# Update feed = GitHub Releases. The "Check for Updates" button and the
# auto-updater read from github.com/<owner>/<repo>/releases.
# NOTE: change `repo` here if you name the GitHub repo something other than
# "wicked-suite". The repo (or at least its Releases/assets) must be reachable
# without a token — i.e. a PUBLIC repo — for the keyless updater to work.
# Until the repo exists and has a published Release, "Check for Updates" simply
# reports "no updates found yet" (handled gracefully).
# ──────────────────────────────────────────────────────────────
publish:
  - provider: github
    owner: trendlinepros-afk
    repo: wicked-suite
